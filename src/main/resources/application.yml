spring:
  application:
    name: book-management
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/book_management}
    username: ${DB_USER:book_user}
    password: ${DB_PASSWORD:book_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: app
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: app
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n"

app:
  default-user-email: ${DEFAULT_USER_EMAIL:demo@example.com}
  isbn:
    openbd-url: ${OPENBD_URL:https://openbd.jp/get}
    google-books-url: ${GOOGLE_BOOKS_URL:https://www.googleapis.com/books/v1/volumes}
    cache-ttl: ${ISBN_CACHE_TTL:P7D}
