spring:
  application:
    name: book-management
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/book_management}
    username: ${DB_USER:book_user}
    password: ${DB_PASSWORD:book_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: app
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: app
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n"

app:
  default-user-email: ${DEFAULT_USER_EMAIL:demo@example.com}
  isbn:
    openbd-url: ${OPENBD_URL:https://api.openbd.jp/v1/get}
    google-books-url: ${GOOGLE_BOOKS_URL:https://www.googleapis.com/books/v1/volumes}
    cache-ttl: ${ISBN_CACHE_TTL:P7D}
  jwt:
    secret: ${JWT_SECRET:booksMemo-development-jwt-secret-key-for-HS256-algorithm-32bytes}
    expiry-seconds: ${JWT_EXPIRY_SECONDS:86400}
    issuer: ${JWT_ISSUER:books-memo-api}
    audience: ${JWT_AUDIENCE:books-memo-web}
    allowed-clock-skew-seconds: ${JWT_ALLOWED_CLOCK_SKEW_SECONDS:30}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
    login-rate-limit:
      max-failures: ${LOGIN_RATE_LIMIT_MAX_FAILURES:5}
      window: ${LOGIN_RATE_LIMIT_WINDOW:PT15M}
      lockout: ${LOGIN_RATE_LIMIT_LOCKOUT:PT15M}
