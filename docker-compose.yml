services:
  postgres:
    image: postgres:16
    container_name: book-management-postgres
    environment:
      POSTGRES_DB: book_management
      POSTGRES_USER: book_user
      POSTGRES_PASSWORD: book_pass
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U book_user -d book_management"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
